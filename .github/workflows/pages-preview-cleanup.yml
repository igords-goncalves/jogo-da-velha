name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Checkout gh-pages branch (if exists)
        id: checkout-gh-pages
        run: |
          git fetch origin gh-pages || { echo "gh-pages branch does not exist"; exit 0; }
          git checkout gh-pages

      - name: Remove preview folder
        if: steps.checkout-gh-pages.outcome == 'success'
        run: |
          PREVIEW_DIR="previews/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            rm -rf "$PREVIEW_DIR"
            echo "Removed $PREVIEW_DIR"
          else
            echo "Preview directory $PREVIEW_DIR does not exist, skipping"
          fi

      - name: Commit and push cleanup
        if: steps.checkout-gh-pages.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          fi
